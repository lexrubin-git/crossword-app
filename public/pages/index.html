<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossword With Friends</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ Join lobby overlay ══ -->
<div class="overlay-backdrop hidden" id="join-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Join a lobby</div>
    <p class="overlay-sub2">Enter the code and pick your name and color.</p>
    <label class="field-label" for="join-code">Lobby code</label>
    <input class="code-input" id="join-code" type="text" maxlength="4" placeholder="XXXX" />
    <div class="field-error" id="join-error">Please enter a valid lobby code.</div>
    <div style="margin-top:20px">
      <label class="field-label" for="join-name">Your name</label>
      <input class="name-input" id="join-name" type="text" maxlength="20" placeholder="Wordsmith42" />
      <div class="field-error" id="join-name-error">Please enter your name.</div>
    </div>
    <div style="margin-top:18px;margin-bottom:24px">
      <label class="field-label">Your color</label>
      <div id="join-color-locked" style="font-size:12px;color:#bbb;margin-bottom:6px">Enter a valid code above to pick your color</div>
      <div class="color-swatches" id="join-color-swatches" style="opacity:0.35;pointer-events:none"></div>
    </div>
    <div class="overlay-row">
      <button class="btn-ghost" id="join-cancel-btn">Cancel</button>
      <button class="btn-primary" id="join-btn">Join →</button>
    </div>
  </div>
</div>

<!-- ══ Profile overlay ══ -->
<div class="overlay-backdrop hidden" id="profile-overlay">
  <div class="overlay-card" style="max-width:400px">
    <div class="overlay-title">Your profile</div>
    <div style="margin-bottom:16px">
      <label class="field-label" for="player-name">Your name</label>
      <input class="name-input" id="player-name" type="text" maxlength="20" placeholder="Wordsmith42" />
      <div class="field-error" id="name-error">Please enter a name to continue.</div>
    </div>
    <div style="margin-bottom:24px">
      <label class="field-label">Your color</label>
      <div class="color-swatches" id="color-swatches"></div>
    </div>
    <div id="profile-avatar-preview" style="display:none"></div>
    <div class="overlay-row">
      <button class="btn-ghost" id="profile-cancel-btn">Cancel</button>
      <button class="btn-primary" id="profile-confirm-btn">Save →</button>
    </div>
  </div>
</div>

<!-- ══ Home screen ══ -->
<main style="display:flex;flex-direction:column;align-items:center;justify-content:center;
             min-height:100vh;text-align:center;padding:0 24px;">

  <!-- Logo -->
  <div style="margin-bottom:48px" id="logo-wrap"></div>

  <!-- Buttons -->
  <div style="display:flex;flex-direction:column;gap:14px;width:100%;max-width:380px;align-items:center">
    <button class="btn-primary" id="create-lobby-btn"
            style="width:100%;padding:14px 24px;font-size:15px;border-radius:10px">
      Create a lobby
    </button>
    <button class="btn-ghost" id="join-lobby-btn"
            style="width:100%;padding:14px 24px;font-size:15px;border-radius:10px;justify-content:center">
      Join a lobby
    </button>
  </div>

  <!-- Identity chip -->
  <div style="display:flex;align-items:center;gap:10px;margin-top:36px;font-size:13px;color:var(--text2)">
    <div id="chip-avatar"
         style="width:28px;height:28px;border-radius:50%;flex-shrink:0;cursor:pointer;
                display:flex;align-items:center;justify-content:center;
                font-size:11px;font-weight:700;color:#fff;
                background-size:cover;background-position:center"></div>
    <span id="chip-name" style="cursor:pointer"></span>
    <button class="btn-ghost" id="edit-profile-btn" style="padding:5px 10px;font-size:12px">
      Edit profile
    </button>
  </div>

</main>

<script type="module" src="/js/firebase.js"></script>
<script type="module" src="/js/controllers/home.controller.js"></script>
</body>
</html>
